<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VoltManage Chile</title>
    <meta name="description" content="PWA para gestión de servicios eléctricos en Chile">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a8c8c">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ============================================================ -->
    <!-- HOME SCREEN: Wheel Navigation                                -->
    <!-- ============================================================ -->
    <div id="home-screen" class="home-screen">
        <header class="home-header">
            <div class="logo-brand">
                <div class="logo-icon"><i class="ph ph-lightning-slash"></i></div>
                <div>
                    <h1 class="brand-title">VoltManage</h1>
                    <p class="brand-sub">Servicios Eléctricos Chile</p>
                </div>
            </div>
            <div id="connection-badge" class="connection-badge online">
                <i class="ph ph-wifi-high"></i> <span>Online</span>
            </div>
        </header>

        <!-- SVG Wheel -->
        <div class="wheel-container">
            <svg id="wheel-svg" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                        <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="rgba(0,0,0,0.18)"/>
                    </filter>
                </defs>

                <!-- Outer ring sectors (6 sectors, 60° each) -->
                <!-- Sector 1: Flujo de Caja — top-right -->
                <path class="sector s1" d="M300,300 L300,60 A240,240 0 0,1 507.85,180 Z" data-view="dashboard"/>
                <!-- Sector 2: Presupuesto — right -->
                <path class="sector s2" d="M300,300 L507.85,180 A240,240 0 0,1 507.85,420 Z" data-view="budget"/>
                <!-- Sector 3: Cobros — bottom-right -->
                <path class="sector s3" d="M300,300 L507.85,420 A240,240 0 0,1 300,540 Z" data-view="billing"/>
                <!-- Sector 4: Bitácora — bottom-left -->
                <path class="sector s4" d="M300,300 L300,540 A240,240 0 0,1 92.15,420 Z" data-view="logbook"/>
                <!-- Sector 5: Inventario — left -->
                <path class="sector s5" d="M300,300 L92.15,420 A240,240 0 0,1 92.15,180 Z" data-view="inventory"/>
                <!-- Sector 6: Ajustes — top-left -->
                <path class="sector s6" d="M300,300 L92.15,180 A240,240 0 0,1 300,60 Z" data-view="settings"/>

                <!-- Icon circles (white circles on each sector) -->
                <!-- Flujo de Caja icon circle (top-right, ~60° midpoint = 30°) -->
                <circle class="icon-circle" cx="392" cy="168" r="38"/>
                <!-- Presupuesto icon circle (right, ~90°) -->
                <circle class="icon-circle" cx="449" cy="300" r="38"/>
                <!-- Cobros icon circle (bottom-right, ~150°) -->
                <circle class="icon-circle" cx="392" cy="432" r="38"/>
                <!-- Bitácora icon circle (bottom-left, ~210°) -->
                <circle class="icon-circle" cx="208" cy="432" r="38"/>
                <!-- Inventario icon circle (left, ~270°) -->
                <circle class="icon-circle" cx="151" cy="300" r="38"/>
                <!-- Ajustes icon circle (top-left, ~330°) -->
                <circle class="icon-circle" cx="208" cy="168" r="38"/>

                <!-- Center Circle -->
                <circle class="center-circle" cx="300" cy="300" r="95" filter="url(#shadow)"/>
                <text class="center-text" x="300" y="290" text-anchor="middle">VOLT</text>
                <text class="center-text" x="300" y="318" text-anchor="middle">MANAGE</text>

                <!-- SVG Icons via foreignObject — text icons -->
                <text class="sector-icon" x="392" y="176" text-anchor="middle">📊</text>
                <text class="sector-icon" x="449" y="308" text-anchor="middle">🧮</text>
                <text class="sector-icon" x="392" y="440" text-anchor="middle">💳</text>
                <text class="sector-icon" x="208" y="440" text-anchor="middle">📷</text>
                <text class="sector-icon" x="151" y="308" text-anchor="middle">📦</text>
                <text class="sector-icon" x="208" y="176" text-anchor="middle">⚙️</text>
            </svg>

            <!-- Labels pointing outward -->
            <div class="wheel-labels">
                <div class="wheel-label label-tr" data-view="dashboard">
                    <span>FLUJO DE CAJA</span>
                </div>
                <div class="wheel-label label-r" data-view="budget">
                    <span>PRESUPUESTO</span>
                </div>
                <div class="wheel-label label-br" data-view="billing">
                    <span>COBROS</span>
                </div>
                <div class="wheel-label label-bl" data-view="logbook">
                    <span>BITÁCORA</span>
                </div>
                <div class="wheel-label label-l" data-view="inventory">
                    <span>INVENTARIO</span>
                </div>
                <div class="wheel-label label-tl" data-view="settings">
                    <span>AJUSTES</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- MODULE SCREENS (appear when a sector is clicked)            -->
    <!-- ============================================================ -->
    <div id="module-screen" class="module-screen hidden">
        <header class="module-header">
            <button id="back-btn" class="back-btn">
                <i class="ph ph-arrow-left"></i>
            </button>
            <h2 id="module-title">Módulo</h2>
            <div id="module-header-action"></div>
        </header>
        <div id="module-content" class="module-content"></div>
    </div>

    <!-- Modal Container -->
    <div id="modal-container"></div>

    <!-- Scripts -->
    <script src="js/db.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/budget.js"></script>
    <script src="js/inventory.js"></script>
    <script src="js/logbook.js"></script>
    <script src="js/billing.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/pdfGenerator.js"></script>
    <script src="js/app.js"></script>

    <!-- Registro del Service Worker y Lógica de Actualización -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(reg => {
                        console.log('SW registrado con éxito:', reg.scope);
                        
                        // Detectar si hay una versión nueva esperando
                        reg.addEventListener('updatefound', () => {
                            const newWorker = reg.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    // Nueva versión disponible, forzar recarga
                                    console.log('Nueva versión detectada. Recargando...');
                                    window.location.reload();
                                }
                            });
                        });
                    })
                    .catch(e => console.warn('Error en SW:', e));
            });
        }
    </script>
</body>
</html>
